<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Database Agent</title>
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg" />
  <style>
    :root {
      --bg:       #080d1a;
      --surface:  #0f1629;
      --surface2: #162035;
      --border:   #1e2d45;
      --accent:   #0ea5e9;
      --accent2:  #0284c7;
      --accent-dim:#082f49;
      --text:     #e2eaf6;
      --text2:    #7d97b8;
      --text3:    #3d5470;
      --green:    #22c55e;
      --red:      #f87171;
      --yellow:   #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 14px; }

    /* ── Login ────────────────────────────────── */
    #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: radial-gradient(ellipse at 50% 0%, #0c1f3a 0%, var(--bg) 70%); }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .login-logo img { width: 36px; height: 36px; }
    .login-logo h1 { font-size: 1.25rem; color: var(--accent); font-weight: 700; }
    .login-box p { font-size: 0.82rem; color: var(--text2); margin-bottom: 28px; }
    .login-box label { font-size: 0.75rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }
    .login-box input { width: 100%; padding: 10px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; margin-bottom: 14px; outline: none; transition: border-color 0.15s; }
    .login-box input:focus { border-color: var(--accent); }
    .btn-login { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 8px; color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .btn-login:hover { background: var(--accent2); }
    .btn-login:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
    #login-error { color: var(--red); font-size: 0.78rem; margin-top: 10px; display: none; }
    .login-hint { margin-top: 18px; font-size: 0.73rem; color: var(--text3); border-top: 1px solid var(--border); padding-top: 14px; }

    /* ── App ──────────────────────────────────── */
    #app-screen { display: none; flex-direction: column; height: 100vh; }

    /* ── Header ───────────────────────────────── */
    header { height: 52px; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 20; }
    .hdr-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
    .hdr-logo img { width: 26px; height: 26px; }
    .hdr-logo span { font-size: 0.95rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .hdr-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .hdr-session-name { background: none; border: none; color: var(--text); font-size: 0.88rem; font-weight: 500; cursor: text; padding: 4px 8px; border-radius: 6px; outline: none; min-width: 80px; max-width: 200px; transition: background 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-session-name:hover { background: var(--surface2); }
    .hdr-session-name:focus { background: var(--surface2); border-bottom: 1px solid var(--accent); border-radius: 6px 6px 0 0; }
    .hdr-spacer { flex: 1; }
    .llm-badge { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 0.72rem; color: var(--text2); flex-shrink: 0; }
    .llm-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .hdr-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 0.78rem; display: flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hdr-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .hdr-user { font-size: 0.78rem; color: var(--text3); flex-shrink: 0; }

    /* ── Main layout ──────────────────────────── */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── Sessions sidebar ─────────────────────── */
    #sessions-panel { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .sessions-header { padding: 12px 10px 8px; }
    .btn-new-chat { width: 100%; padding: 8px 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
    .btn-new-chat:hover { background: var(--accent2); }
    .sessions-label { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 12px 4px; }
    .sessions-list { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
    .session-item { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; group: true; margin-bottom: 2px; }
    .session-item:hover { background: var(--surface2); }
    .session-item.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }
    .session-item.active .si-name { color: var(--accent); }
    .si-icon { font-size: 0.8rem; flex-shrink: 0; opacity: 0.6; }
    .si-info { flex: 1; overflow: hidden; }
    .si-name { font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .si-time { font-size: 0.67rem; color: var(--text3); }
    .si-del { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 0.75rem; opacity: 0; transition: all 0.15s; flex-shrink: 0; }
    .session-item:hover .si-del { opacity: 1; }
    .si-del:hover { color: var(--red); background: rgba(248,113,113,0.1); }
    .sessions-footer { padding: 10px; border-top: 1px solid var(--border); }
    .db-badge { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text2); padding: 5px 8px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); }
    .db-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

    /* ── Chat wrap ────────────────────────────── */
    .chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── Messages ─────────────────────────────── */
    #messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
    .msg { max-width: 820px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg.agent { align-self: flex-start; }
    .msg-meta { font-size: 0.67rem; color: var(--text3); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
    .msg.user .msg-meta { justify-content: flex-end; }
    .msg-role { font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .msg.agent .msg-role { color: var(--accent); }
    .msg.user .bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px 12px 4px 12px; padding: 10px 15px; font-size: 0.88rem; text-align: right; color: var(--text); }
    .msg.agent .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; padding: 16px 18px; }

    /* ── Agent content ────────────────────────── */
    .ans-explanation { font-size: 0.88rem; color: var(--text); line-height: 1.7; margin-bottom: 14px; }
    .ans-row-count { font-size: 0.72rem; color: var(--text3); margin-bottom: 6px; }
    .ans-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; }
    .ans-table-wrap table { border-collapse: collapse; width: 100%; font-size: 0.78rem; }
    .ans-table-wrap th { background: var(--surface2); color: var(--accent); padding: 8px 14px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .ans-table-wrap td { padding: 7px 14px; border-bottom: 1px solid #0f1629; color: var(--text); }
    .ans-table-wrap tr:last-child td { border-bottom: none; }
    .ans-table-wrap tr:hover td { background: var(--surface2); }
    .ans-no-rows { font-size: 0.82rem; color: var(--text3); font-style: italic; margin-bottom: 12px; }
    .ans-error { color: var(--red); font-size: 0.85rem; padding: 10px 14px; background: rgba(248,113,113,0.08); border-radius: 8px; border-left: 3px solid var(--red); }

    /* ── Table actions ────────────────────────── */
    .table-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .btn-export { background: none; border: 1px solid var(--border); color: var(--text3); font-size: 0.7rem; padding: 3px 9px; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SQL toggle ───────────────────────────── */
    .sql-footer { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .sql-toggle { background: none; border: none; color: var(--text3); font-size: 0.73rem; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
    .sql-toggle:hover { color: var(--accent); }
    .sql-toggle .arr { transition: transform 0.2s; display: inline-block; }
    .sql-toggle.open .arr { transform: rotate(90deg); }
    .sql-block { display: none; margin-top: 8px; background: #060c18; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: 'Courier New', monospace; font-size: 0.76rem; color: #7dd3fc; white-space: pre-wrap; word-break: break-word; }
    .sql-block.visible { display: block; }
    .btn-copy-sql { background: none; border: none; color: var(--text3); font-size: 0.7rem; cursor: pointer; padding: 0; transition: color 0.15s; }
    .btn-copy-sql:hover { color: var(--accent); }

    /* ── Typing ───────────────────────────────── */
    .typing { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
    .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Welcome ──────────────────────────────── */
    .welcome-msg { align-self: flex-start; max-width: 640px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; padding: 16px 20px; }
    .welcome-msg h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 6px; }
    .welcome-msg p { font-size: 0.83rem; color: var(--text2); line-height: 1.6; }

    /* ── Chips ────────────────────────────────── */
    .chips-bar { padding: 6px 24px 10px; display: flex; flex-wrap: wrap; gap: 7px; flex-shrink: 0; }
    .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; font-size: 0.75rem; color: var(--text2); cursor: pointer; transition: all 0.15s; user-select: none; }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Input bar ────────────────────────────── */
    .input-bar { padding: 12px 24px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    #question-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 14px; font-size: 0.88rem; resize: none; outline: none; min-height: 42px; max-height: 120px; font-family: inherit; line-height: 1.45; transition: border-color 0.15s; }
    #question-input:focus { border-color: var(--accent); }
    #question-input::placeholder { color: var(--text3); }
    #send-btn { background: var(--accent); border: none; border-radius: 10px; color: white; padding: 0 20px; height: 42px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; flex-shrink: 0; }
    #send-btn:hover { background: var(--accent2); }
    #send-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

    /* ── Schema slide-out ─────────────────────── */
    #schema-panel { position: absolute; top: 0; right: 0; height: 100%; width: 290px; background: var(--surface); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.25s ease; overflow-y: auto; z-index: 10; padding: 18px 16px; }
    #schema-panel.open { transform: translateX(0); }
    .schema-hdr { font-size: 0.67rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .schema-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.9rem; }
    .schema-close:hover { color: var(--text); }
    .schema-tbl { margin-bottom: 14px; }
    .schema-tbl-name { font-size: 0.78rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
    .schema-col { font-size: 0.71rem; color: var(--text3); line-height: 1.85; padding-left: 8px; }
    .schema-col span { color: var(--text3); margin-left: 4px; font-size: 0.67rem; opacity: 0.6; }
    #schema-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.45); z-index: 9; pointer-events: none; }
    #schema-overlay.visible { display: block; pointer-events: auto; }

    /* ── Rename modal ─────────────────────────── */
    #rename-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
    #rename-modal.open { display: flex; }
    .rename-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 320px; }
    .rename-box h3 { font-size: 0.9rem; color: var(--text); margin-bottom: 14px; }
    .rename-box input { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 0.88rem; outline: none; margin-bottom: 14px; }
    .rename-box input:focus { border-color: var(--accent); }
    .rename-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .rename-actions button { padding: 7px 16px; border-radius: 7px; font-size: 0.82rem; cursor: pointer; border: 1px solid var(--border); }
    .btn-cancel { background: none; color: var(--text2); }
    .btn-cancel:hover { border-color: var(--text2); }
    .btn-save-rename { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
    .btn-save-rename:hover { background: var(--accent2); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="/static/icon.svg" alt="icon" />
      <h1>SQL Database Agent</h1>
    </div>
    <p>Ask questions in plain English. Get live answers from your data.</p>
    <label>Username</label>
    <input id="username" type="text" placeholder="Username" value="demo" />
    <label>Password</label>
    <input id="password" type="password" placeholder="Password" value="demo123" />
    <button class="btn-login" id="login-btn" onclick="login()">Sign In →</button>
    <div id="login-error">Invalid username or password</div>
    <div class="login-hint">Demo accounts: <strong>demo / demo123</strong> &nbsp;·&nbsp; <strong>admin / admin123</strong></div>
  </div>
</div>

<!-- ── App ────────────────────────────────────────── -->
<div id="app-screen">

  <!-- Header -->
  <header>
    <div class="hdr-logo">
      <img src="/static/icon.svg" alt="icon" />
      <span>SQL Agent</span>
    </div>
    <div class="hdr-divider"></div>
    <input class="hdr-session-name" id="hdr-session-name" type="text"
      placeholder="Chat name"
      onchange="renameCurrentSession(this.value)"
      title="Click to rename this chat" />
    <div class="hdr-spacer"></div>
    <div class="llm-badge">
      <div class="llm-dot"></div>
      <span id="llm-label">Groq</span>
    </div>
    <button class="hdr-btn" id="schema-btn" onclick="toggleSchema()">📋 Schema</button>
    <span class="hdr-user" id="hdr-user"></span>
    <button class="hdr-btn" onclick="logout()">Sign out</button>
  </header>

  <div class="main">

    <!-- Sessions Sidebar -->
    <div id="sessions-panel">
      <div class="sessions-header">
        <button class="btn-new-chat" onclick="createAndSwitchSession()">＋ New Chat</button>
      </div>
      <div class="sessions-label">Chats</div>
      <div class="sessions-list" id="sessions-list"></div>
      <div class="sessions-footer">
        <div class="db-badge">
          <div class="db-dot"></div>
          <span>Chinook · SQLite</span>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-wrap">
      <div id="messages"></div>
      <div class="chips-bar" id="chips"></div>
      <div class="input-bar">
        <textarea id="question-input" placeholder="Ask a question about your data…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendQuery()">Ask ↵</button>
      </div>
    </div>

    <!-- Schema overlay + panel -->
    <div id="schema-overlay" onclick="toggleSchema()"></div>
    <div id="schema-panel">
      <div class="schema-hdr">
        Database Schema
        <button class="schema-close" onclick="toggleSchema()">✕</button>
      </div>
      <div id="schema-content"><span style="color:var(--text3);font-size:0.78rem">Loading…</span></div>
    </div>
  </div>
</div>

<!-- Rename modal -->
<div id="rename-modal">
  <div class="rename-box">
    <h3>Rename Chat</h3>
    <input id="rename-input" type="text" placeholder="Chat name" />
    <div class="rename-actions">
      <button class="btn-cancel" onclick="closeRename()">Cancel</button>
      <button class="btn-save-rename" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
const SAMPLES = [
  "Top 5 artists by number of tracks",
  "Most popular genres",
  "Best selling albums by revenue",
  "Customers who spent the most",
  "Average track length by genre",
  "Invoices from USA in 2009",
];

let token = null;
let currentUser = null;
let sessions = [];
let currentId = null;
let schemaOpen = false;
let _querying = false;
let _renameId = null;

// ── Boot ───────────────────────────────────────────
(function init() {
  token = localStorage.getItem("sql_token");
  currentUser = localStorage.getItem("sql_user");
  if (token && currentUser) {
    loadSessions();
    showApp();
  }
})();

// ── Sessions ───────────────────────────────────────
function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem("sql_sessions") || "[]"); } catch { sessions = []; }
  if (!sessions.length) sessions.push(makeSession("New Chat"));
  currentId = localStorage.getItem("sql_current");
  if (!sessions.find(s => s.id === currentId)) currentId = sessions[0].id;
}

function makeSession(name) {
  return { id: "s" + Date.now() + Math.random().toString(36).slice(2,6), name, messages: [], createdAt: Date.now() };
}

function saveSessions() {
  localStorage.setItem("sql_sessions", JSON.stringify(sessions));
  localStorage.setItem("sql_current", currentId);
}

function currentSession() { return sessions.find(s => s.id === currentId) || sessions[0]; }

function createAndSwitchSession() {
  const s = makeSession("New Chat");
  sessions.unshift(s);
  currentId = s.id;
  saveSessions();
  renderSessions();
  renderMessages();
  updateHeaderSession();
  document.getElementById("question-input").focus();
}

function switchSession(id) {
  if (id === currentId) return;
  currentId = id;
  saveSessions();
  renderSessions();
  renderMessages();
  updateHeaderSession();
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (!sessions.length) sessions.push(makeSession("New Chat"));
  if (currentId === id) currentId = sessions[0].id;
  saveSessions();
  renderSessions();
  if (currentId === id) renderMessages();
  updateHeaderSession();
}

function renameCurrentSession(name) {
  const s = currentSession();
  if (s && name.trim()) { s.name = name.trim(); saveSessions(); renderSessions(); }
}

function openRenameModal(id, e) {
  e.stopPropagation();
  _renameId = id;
  const s = sessions.find(x => x.id === id);
  document.getElementById("rename-input").value = s ? s.name : "";
  document.getElementById("rename-modal").classList.add("open");
  setTimeout(() => document.getElementById("rename-input").select(), 50);
}

function closeRename() {
  document.getElementById("rename-modal").classList.remove("open");
  _renameId = null;
}

function saveRename() {
  const name = document.getElementById("rename-input").value.trim();
  if (_renameId && name) {
    const s = sessions.find(x => x.id === _renameId);
    if (s) { s.name = name; saveSessions(); renderSessions(); updateHeaderSession(); }
  }
  closeRename();
}

document.getElementById("rename-input")?.addEventListener("keydown", e => {
  if (e.key === "Enter") saveRename();
  if (e.key === "Escape") closeRename();
});

function renderSessions() {
  const list = document.getElementById("sessions-list");
  list.innerHTML = "";
  sessions.forEach(s => {
    const div = document.createElement("div");
    div.className = "session-item" + (s.id === currentId ? " active" : "");
    div.onclick = () => switchSession(s.id);
    const ago = timeAgo(s.createdAt);
    div.innerHTML = `
      <span class="si-icon">💬</span>
      <div class="si-info">
        <div class="si-name" title="${esc(s.name)}">${esc(s.name)}</div>
        <div class="si-time">${ago}</div>
      </div>
      <button class="si-del" title="Rename" onclick="openRenameModal('${s.id}', event)">✎</button>
      <button class="si-del" title="Delete" onclick="deleteSession('${s.id}', event)">✕</button>`;
    list.appendChild(div);
  });
}

function updateHeaderSession() {
  const s = currentSession();
  const el = document.getElementById("hdr-session-name");
  if (el && s) el.value = s.name;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return "just now";
  if (diff < 3600000) return Math.floor(diff/60000) + "m ago";
  if (diff < 86400000) return Math.floor(diff/3600000) + "h ago";
  return Math.floor(diff/86400000) + "d ago";
}

// ── Auth ───────────────────────────────────────────
async function login() {
  const btn = document.getElementById("login-btn");
  btn.disabled = true; btn.textContent = "Signing in…";
  document.getElementById("login-error").style.display = "none";
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  try {
    const res = await fetch("/auth/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username: u, password: p}),
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    token = data.access_token; currentUser = data.username;
    localStorage.setItem("sql_token", token);
    localStorage.setItem("sql_user", currentUser);
    loadSessions();
    showApp();
  } catch { document.getElementById("login-error").style.display = "block"; }
  finally { btn.disabled = false; btn.textContent = "Sign In →"; }
}

function logout() {
  localStorage.removeItem("sql_token");
  localStorage.removeItem("sql_user");
  token = null;
  document.getElementById("app-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "flex";
  document.getElementById("hdr-user").textContent = currentUser;
  // LLM badge
  fetch("/debug/config").then(r => r.json()).then(d => {
    document.getElementById("llm-label").textContent =
      d.llm_provider === "groq" ? "Groq · " + (d.groq_model || "").split("-").slice(0,3).join("-") : "Ollama";
  }).catch(() => {});
  renderChips();
  loadSchema();
  renderSessions();
  renderMessages();
  updateHeaderSession();
}

// ── Chips ──────────────────────────────────────────
function renderChips() {
  const container = document.getElementById("chips");
  container.innerHTML = "";
  SAMPLES.forEach(s => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = s;
    chip.addEventListener("click", () => {
      document.getElementById("question-input").value = s;
      sendQuery();
    });
    container.appendChild(chip);
  });
}

// ── Schema ─────────────────────────────────────────
function toggleSchema() {
  schemaOpen = !schemaOpen;
  document.getElementById("schema-panel").classList.toggle("open", schemaOpen);
  document.getElementById("schema-overlay").classList.toggle("visible", schemaOpen);
  document.getElementById("schema-btn").classList.toggle("active", schemaOpen);
}

async function loadSchema() {
  try {
    const res = await fetch("/schema", {headers: {Authorization: `Bearer ${token}`}});
    const data = await res.json();
    renderSchema(data.schema);
  } catch {
    document.getElementById("schema-content").innerHTML = '<span style="color:var(--red);font-size:0.78rem">Failed to load schema</span>';
  }
}

function renderSchema(text) {
  const html = text.trim().split("\n").map(line => {
    const m = line.match(/^(\w+)\((.+)\)$/);
    if (!m) return "";
    const cols = m[2].split(",").map(c => {
      const parts = c.trim().split(" ");
      return `<div class="schema-col">${parts[0]}<span>${parts.slice(1).join(" ")}</span></div>`;
    }).join("");
    return `<div class="schema-tbl"><div class="schema-tbl-name">${m[1]}</div>${cols}</div>`;
  }).join("");
  document.getElementById("schema-content").innerHTML = html;
}

// ── Messages ───────────────────────────────────────
function renderMessages() {
  const container = document.getElementById("messages");
  container.innerHTML = "";
  const s = currentSession();
  if (!s || !s.messages.length) {
    const w = document.createElement("div");
    w.className = "welcome-msg";
    w.innerHTML = `<h3>👋 Start a conversation</h3><p>Ask anything about the Chinook music store database — artists, albums, sales, customers, genres, and more.</p>`;
    container.appendChild(w);
    return;
  }
  s.messages.forEach(m => {
    if (m.role === "user") _appendUserBubble(m.content);
    else _appendAgentBubble(m.data);
  });
  scrollBottom();
}

function scrollBottom() {
  const el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}

function _appendUserBubble(text) {
  const msgs = document.getElementById("messages");
  // Remove welcome msg if present
  msgs.querySelector(".welcome-msg")?.remove();
  const d = document.createElement("div");
  d.className = "msg user";
  d.innerHTML = `<div class="msg-meta"><span class="msg-role">You</span></div><div class="bubble">${esc(text)}</div>`;
  msgs.appendChild(d);
}

function _appendAgentBubble(data) {
  const msgs = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = "msg agent";
  let html = `<div class="msg-meta"><span class="msg-role">Agent</span></div><div class="bubble">`;

  if (data.error) {
    html += `<div class="ans-error">${esc(data.error)}</div>`;
  } else {
    if (data.explanation) html += `<div class="ans-explanation">${esc(data.explanation)}</div>`;

    if (data.rows && data.rows.length > 0) {
      const tid = "t" + Date.now() + Math.random().toString(36).slice(2,5);
      html += `<div class="table-actions">
        <div class="ans-row-count">${data.rows.length} result${data.rows.length !== 1 ? "s" : ""}</div>
        <button class="btn-export" onclick="exportCSV('${tid}','${esc(data.columns.join(","))}')">⬇ Export CSV</button>
      </div>`;
      html += `<div class="ans-table-wrap" id="${tid}"><table><thead><tr>`;
      data.columns.forEach(c => { html += `<th>${esc(c)}</th>`; });
      html += `</tr></thead><tbody>`;
      data.rows.forEach(row => {
        html += `<tr>`;
        row.forEach(v => { html += `<td>${v == null ? `<em style="color:var(--text3)">—</em>` : esc(String(v))}</td>`; });
        html += `</tr>`;
      });
      html += `</tbody></table></div>`;
    } else {
      html += `<div class="ans-no-rows">No results returned.</div>`;
    }

    if (data.sql) {
      const sid = "sq" + Date.now() + Math.random().toString(36).slice(2,5);
      html += `<div class="sql-footer">
        <button class="sql-toggle" onclick="toggleSQL('${sid}',this)"><span class="arr">▶</span> View SQL</button>
        <button class="btn-copy-sql" onclick="copySQL('${sid}')" title="Copy SQL">⎘ Copy</button>
      </div>`;
      html += `<div class="sql-block" id="${sid}">${esc(data.sql)}</div>`;
    }
  }

  html += `</div>`;
  d.innerHTML = html;
  msgs.appendChild(d);
}

function toggleSQL(id, btn) {
  const b = document.getElementById(id);
  const open = b.classList.toggle("visible");
  btn.classList.toggle("open", open);
  btn.querySelector(".arr").textContent = open ? "▼" : "▶";
}

function copySQL(id) {
  const sql = document.getElementById(id)?.textContent || "";
  navigator.clipboard.writeText(sql).then(() => {
    const btn = document.querySelector(`[onclick="copySQL('${id}')"]`);
    if (btn) { btn.textContent = "✓ Copied"; setTimeout(() => btn.textContent = "⎘ Copy", 1800); }
  });
}

function exportCSV(tableId, colsStr) {
  const table = document.getElementById(tableId)?.querySelector("table");
  if (!table) return;
  const rows = Array.from(table.querySelectorAll("tr")).map(r =>
    Array.from(r.querySelectorAll("th,td")).map(c => '"' + c.textContent.replace(/"/g,'""') + '"').join(",")
  );
  const blob = new Blob([rows.join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "results.csv";
  a.click();
}

// ── Query ──────────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

async function sendQuery() {
  const input = document.getElementById("question-input");
  const q = input.value.trim();
  if (!q || _querying) return;

  _querying = true;
  const btn = document.getElementById("send-btn");
  btn.disabled = true;
  input.value = ""; input.style.height = "auto";

  // Persist user message
  const s = currentSession();
  s.messages.push({role: "user", content: q});
  if (s.name === "New Chat") {
    s.name = q.length > 32 ? q.slice(0, 32) + "…" : q;
    updateHeaderSession();
    renderSessions();
  }
  saveSessions();

  _appendUserBubble(q);
  // Typing indicator
  const typing = document.createElement("div");
  typing.className = "msg agent"; typing.id = "typing";
  typing.innerHTML = `<div class="msg-meta"><span class="msg-role">Agent</span></div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  document.getElementById("messages").appendChild(typing);
  scrollBottom();

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 90000);

  try {
    const res = await fetch("/query", {
      method: "POST",
      headers: {"Content-Type":"application/json", Authorization: `Bearer ${token}`},
      body: JSON.stringify({question: q}),
      signal: controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    document.getElementById("typing")?.remove();

    // Persist agent message
    s.messages.push({role: "agent", data});
    saveSessions();

    _appendAgentBubble(data);
    scrollBottom();
  } catch (err) {
    clearTimeout(timer);
    document.getElementById("typing")?.remove();
    const msg = err?.name === "AbortError" ? "Request timed out. Please try again." : "Could not reach the server. Please try again.";
    const data = {error: msg};
    s.messages.push({role: "agent", data});
    saveSessions();
    _appendAgentBubble(data);
    scrollBottom();
  } finally {
    _querying = false;
    btn.disabled = false;
    input.focus();
  }
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
